<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중3 과학 플래시카드 — 대기·운동·역학적 에너지</title>
<style>
  :root{
    --paper:#F2F4F1;
    --ink:#15202A;
    --ink-soft:#4A5763;
    --line:rgba(21,32,42,.10);
    --surface:#FFFFFF;
    --atm:#356BA0;   /* 대기 중의 물 */
    --mot:#B5621C;   /* 운동과 에너지 */
    --mec:#2C7A57;   /* 역학적 에너지 */
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:26px 26px;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 14px 28px;
  }
  .wrap{width:100%;max-width:560px}

  /* header */
  header{margin-bottom:14px}
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:var(--ink-soft);text-transform:uppercase;display:flex;gap:10px;flex-wrap:wrap;
  }
  h1{font-size:23px;margin:6px 0 2px;letter-spacing:-.01em;line-height:1.15}
  .sub{font-size:13px;color:var(--ink-soft)}

  /* toolbar */
  .bar{display:flex;align-items:center;gap:8px;margin:14px 0 10px;flex-wrap:wrap}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{
    font:600 12.5px/1 var(--sans);
    border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
    padding:8px 11px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .chip:hover{border-color:var(--ink-soft)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .spacer{flex:1 1 auto;min-width:8px}
  .tool{
    font:600 12px/1 var(--sans);background:none;border:1px solid var(--line);
    color:var(--ink-soft);padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .tool:hover{border-color:var(--ink-soft);color:var(--ink)}
  .tool[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* card */
  .stage{perspective:1600px;margin-top:4px}
  .card{
    position:relative;width:100%;min-height:340px;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);
    cursor:pointer;
  }
  .card.flip{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 1px 0 rgba(21,32,42,.04),0 18px 40px -28px rgba(21,32,42,.5);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .back{transform:rotateY(180deg)}
  /* spec header bar */
  .spec{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 16px;border-bottom:1px solid var(--line);flex:0 0 auto;
  }
  .pid{font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;font-weight:600}
  .topic-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase}
  .accent-rail{height:3px;width:100%;flex:0 0 auto}

  .body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;
        padding:20px 22px;overflow:auto}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-soft);
          text-transform:uppercase;margin-bottom:12px}
  .term{font-family:var(--mono);font-weight:600;font-size:30px;line-height:1.2;letter-spacing:-.01em;word-break:keep-all}
  .hint{margin-top:auto;padding-top:18px;font-size:11.5px;color:var(--ink-soft)}

  .def{font-size:16.5px;line-height:1.62;word-break:keep-all}
  .formula{
    font-family:var(--mono);font-size:15px;line-height:1.5;
    background:#f7f8f6;border:1px solid var(--line);border-left:3px solid currentColor;
    border-radius:8px;padding:11px 13px;margin-top:14px;overflow-x:auto;white-space:nowrap;
  }
  .formula b{font-weight:700}
  .formula sup{font-size:.72em}
  .extra{font-size:13.5px;line-height:1.55;color:var(--ink-soft);margin-top:12px}
  .extra b{color:var(--ink)}

  /* nav */
  .nav{display:flex;align-items:center;gap:8px;margin-top:14px}
  .btn{
    font:600 14px/1 var(--sans);border:1px solid var(--line);background:var(--surface);
    color:var(--ink);padding:12px 14px;border-radius:10px;cursor:pointer;transition:.15s;flex:0 0 auto;
  }
  .btn:hover{border-color:var(--ink-soft)}
  .btn:active{transform:translateY(1px)}
  .btn.flipbtn{flex:1 1 auto}
  .btn.know[aria-pressed="true"]{background:var(--mec);border-color:var(--mec);color:#fff}
  .counter{font-family:var(--mono);font-size:13px;color:var(--ink-soft);min-width:62px;text-align:center}

  .track{height:5px;background:rgba(21,32,42,.08);border-radius:999px;margin-top:12px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--ink);border-radius:999px;transition:width .3s}

  .legend{display:flex;justify-content:space-between;gap:10px;margin-top:10px;
          font-size:11.5px;color:var(--ink-soft)}
  kbd{font-family:var(--mono);font-size:11px;background:#fff;border:1px solid var(--line);
      border-bottom-width:2px;border-radius:5px;padding:1px 5px}

  /* empty state */
  .empty{display:none;text-align:center;padding:48px 20px;border:1px dashed var(--line);
         border-radius:14px;background:var(--surface)}
  .empty h2{font-size:18px;margin:0 0 8px}
  .empty p{font-size:14px;color:var(--ink-soft);margin:0 0 16px}

  @media (max-width:430px){
    .term{font-size:25px}.def{font-size:15.5px}
    .card{min-height:320px}
  }
  @media (prefers-reduced-motion:reduce){
    .card{transition:none}.fill{transition:none}
  }
  :focus-visible{outline:2px solid var(--atm);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">
      <span>중학교 과학 3</span><span>·</span><span>II·III·VI 단원</span><span>·</span><span id="total-tag">34 CARDS</span>
    </div>
    <h1>대기 · 운동 · 역학적 에너지 플래시카드</h1>
    <div class="sub">용어를 누르면 뒤집혀. 단원별로 걸러서 외우고, 외운 건 체크해 둬.</div>
  </header>

  <div class="bar">
    <div class="chips" id="chips">
      <button class="chip" data-topic="all" aria-pressed="true">전체</button>
      <button class="chip" data-topic="대기 중의 물" aria-pressed="false"><span class="dot" style="background:var(--atm)"></span>대기 중의 물</button>
      <button class="chip" data-topic="운동과 에너지" aria-pressed="false"><span class="dot" style="background:var(--mot)"></span>운동과 에너지</button>
      <button class="chip" data-topic="역학적 에너지" aria-pressed="false"><span class="dot" style="background:var(--mec)"></span>역학적 에너지</button>
    </div>
    <div class="spacer"></div>
    <button class="tool" id="unknown-toggle" aria-pressed="false">안 외운 것만</button>
    <button class="tool" id="shuffle">섞기</button>
    <button class="tool" id="reset" title="순서·체크 초기화">초기화</button>
  </div>

  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="카드 뒤집기">
      <div class="face front">
        <div class="accent-rail" id="rail-f"></div>
        <div class="spec"><span class="pid" id="pid-f">ATM-01</span><span class="topic-tag" id="tag-f">대기</span></div>
        <div class="body">
          <div class="kicker">용어 · TERM</div>
          <div class="term" id="term"></div>
          <div class="hint">탭하거나 <kbd>Space</kbd> 로 뒤집기</div>
        </div>
      </div>
      <div class="face back">
        <div class="accent-rail" id="rail-b"></div>
        <div class="spec"><span class="pid" id="pid-b">ATM-01</span><span class="topic-tag" id="tag-b">대기</span></div>
        <div class="body">
          <div class="kicker">뜻 · DEFINITION</div>
          <div class="def" id="def"></div>
          <div class="formula" id="formula" style="display:none"></div>
          <div class="extra" id="extra" style="display:none"></div>
        </div>
      </div>
    </div>

    <div class="empty" id="empty">
      <h2>이 묶음은 다 외웠어 🎉</h2>
      <p>“안 외운 것만” 필터에 남은 카드가 없어.</p>
      <button class="btn" onclick="document.getElementById('reset').click()">체크 초기화</button>
    </div>
  </div>

  <div class="nav" id="nav">
    <button class="btn" id="prev" aria-label="이전 카드">←</button>
    <button class="btn flipbtn" id="flip">뒤집기</button>
    <button class="btn know" id="know" aria-pressed="false">안다</button>
    <button class="btn" id="next" aria-label="다음 카드">→</button>
  </div>
  <div class="counter" id="counter" style="margin-top:10px;text-align:center">1 / 34</div>
  <div class="track"><div class="fill" id="fill"></div></div>
  <div class="legend">
    <span><kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>Space</kbd> 뒤집기 · <kbd>K</kbd> 안다</span>
    <span id="known-count">외움 0</span>
  </div>
</div>

<script>
const C = {ATM:'var(--atm)',MOT:'var(--mot)',MEC:'var(--mec)'};
const CARDS = [
  // ===== 대기 중의 물 (II-2) =====
  {id:'ATM-01',t:'대기 중의 물',code:'ATM',term:'포화 상태',
   def:'공기가 수증기를 최대한으로 포함하고 있는 상태. 수증기를 더 포함할 수 있으면 <b>불포화 상태</b>.'},
  {id:'ATM-02',t:'대기 중의 물',code:'ATM',term:'포화 수증기량',
   def:'포화 상태의 공기 1 kg에 들어 있는 수증기의 양을 g으로 나타낸 것.',
   formula:'단위 = g/kg · 기온이 <b>높을수록</b> 많아짐',
   extra:'예) 20 ℃ → 14.0 g/kg, 30 ℃ → 26.5 g/kg'},
  {id:'ATM-03',t:'대기 중의 물',code:'ATM',term:'응결',
   def:'대기 중의 수증기가 액체 상태의 물로 변하는 현상.'},
  {id:'ATM-04',t:'대기 중의 물',code:'ATM',term:'이슬점',
   def:'불포화 상태의 공기가 냉각되어 응결이 시작될 때의 온도.',
   extra:'이슬점에서는 <b>실제 수증기량 = 그 온도의 포화 수증기량</b> (상대 습도 100%).'},
  {id:'ATM-05',t:'대기 중의 물',code:'ATM',term:'응결로 나타나는 현상',
   def:'기온이 이슬점보다 낮아져 응결이 일어나며 생기는 현상 — <b>이슬, 안개, 김 서림</b> 등.'},
  {id:'ATM-06',t:'대기 중의 물',code:'ATM',term:'(상대) 습도',
   def:'현재 기온의 포화 수증기량에 대한, 현재 공기 중 실제 수증기량의 비를 백분율로 나타낸 것.',
   formula:'상대 습도(%) = <b>실제 수증기량 ÷ 포화 수증기량</b> × 100',
   extra:'포화 상태이면 상대 습도 = 100 %.'},
  {id:'ATM-07',t:'대기 중의 물',code:'ATM',term:'하루 동안 습도 변화 (맑은 날)',
   def:'기온이 오르는 낮 → 포화 수증기량 증가 → 상대 습도 낮아짐. 기온이 내려가는 밤·새벽 → 상대 습도 높아짐.',
   extra:'기온과 상대 습도는 대체로 <b>반대</b>로 변하고, 이슬점은 수증기량을 따라가 거의 일정.'},
  {id:'ATM-08',t:'대기 중의 물',code:'ATM',term:'단열 팽창',
   def:'공기가 외부와 열을 주고받지 않고 부피가 팽창하는 것. 공기가 단열 팽창하면 <b>기온이 낮아진다</b>.'},
  {id:'ATM-09',t:'대기 중의 물',code:'ATM',term:'구름',
   def:'상승한 공기가 단열 팽창으로 냉각되어 이슬점 이하가 되면 수증기가 응결해 생긴 물방울·얼음 알갱이가 하늘에 떠 있는 것.',
   formula:'상승 → 단열 팽창 → 기온 하강 → 응결 → 구름'},
  {id:'ATM-10',t:'대기 중의 물',code:'ATM',term:'공기가 상승하는 경우',
   def:'① 지표면이 강하게 가열될 때 ② 공기가 한곳으로 모여들 때 ③ 공기가 산을 타고 오를 때 ④ 따뜻한 공기와 찬 공기가 만날 때.'},
  {id:'ATM-11',t:'대기 중의 물',code:'ATM',term:'강수',
   def:'대기 중의 물이 비나 눈 등의 형태로 지표로 떨어지는 것.'},
  {id:'ATM-12',t:'대기 중의 물',code:'ATM',term:'강수 과정',
   def:'<b>중위도·고위도</b>: 수증기가 얼음 알갱이에 달라붙어 성장 → 그대로 내리면 눈, 떨어지며 녹으면 비. <b>저위도</b>: 물방울끼리 충돌·합쳐져 큰 물방울이 되어 비.'},

  // ===== 운동과 에너지 (III) =====
  {id:'MOT-01',t:'운동과 에너지',code:'MOT',term:'운동',
   def:'시간에 따라 물체의 위치가 변하는 현상.'},
  {id:'MOT-02',t:'운동과 에너지',code:'MOT',term:'다중 섬광 사진',
   def:'물체의 위치를 일정한 시간 간격으로 찍어 나타낸 사진. 물체 사이 간격이 <b>넓을수록 빠르다</b>.'},
  {id:'MOT-03',t:'운동과 에너지',code:'MOT',term:'속력',
   def:'단위 시간 동안 물체가 이동한 거리. 단위 m/s, km/h.',
   formula:'속력(m/s) = <b>이동 거리(m) ÷ 걸린 시간(s)</b>'},
  {id:'MOT-04',t:'운동과 에너지',code:'MOT',term:'평균 속력',
   def:'물체가 그 시간 동안 평균적으로 어느 정도 빠르기로 운동했는지를 나타낸 값.'},
  {id:'MOT-05',t:'운동과 에너지',code:'MOT',term:'등속 운동',
   def:'속력이 변하지 않고 일정한 운동. 같은 시간 동안 같은 거리를 이동한다.'},
  {id:'MOT-06',t:'운동과 에너지',code:'MOT',term:'등속 운동 그래프',
   def:'<b>이동 거리–시간</b>: 원점을 지나는 직선, 기울기 = 속력. <b>속력–시간</b>: 시간축에 나란한 직선, 아랫부분 넓이 = 이동 거리.',
   formula:'기울기 = 속력 · 넓이(속력×시간) = 이동 거리'},
  {id:'MOT-07',t:'운동과 에너지',code:'MOT',term:'자유 낙하 운동',
   def:'공중에서 정지해 있던 물체가 중력만을 받아 떨어지는 운동 (공기와의 마찰은 무시).'},
  {id:'MOT-08',t:'운동과 에너지',code:'MOT',term:'자유 낙하 속력 변화',
   def:'속력이 1초마다 <b>9.8 m/s씩 일정하게 증가</b>. 속력–시간 그래프는 기울기가 일정한 직선.',
   formula:'속력 = <b>9.8 × 시간</b> · (9.8 = 중력 가속도 상수)'},
  {id:'MOT-09',t:'운동과 에너지',code:'MOT',term:'무게',
   def:'물체에 작용하는 중력의 크기.',
   formula:'무게 = <b>9.8 × 질량</b>'},
  {id:'MOT-10',t:'운동과 에너지',code:'MOT',term:'진공에서의 자유 낙하',
   def:'진공에서는 물체의 종류·크기·질량에 관계없이 속력이 1초마다 9.8 m/s씩 증가한다.',
   extra:'→ 같은 높이에서 동시에 떨어뜨리면 <b>지면에 동시에 도달</b> (갈릴레이).'},
  {id:'MOT-11',t:'운동과 에너지',code:'MOT',term:'일 (과학에서의)',
   def:'물체에 힘이 작용하여 물체가 힘의 방향으로 이동할 때, 힘이 물체에 한 것.',
   formula:'일(J) = <b>힘(N) × 이동 거리(m)</b>',
   extra:'1 J = 1 N의 힘으로 물체를 1 m 이동시킨 일.'},
  {id:'MOT-12',t:'운동과 에너지',code:'MOT',term:'일이 0인 경우',
   def:'① 힘의 방향으로 이동한 거리가 0일 때 (역기를 들고 가만히 서 있기) ② 힘의 방향과 이동 방향이 수직일 때 (물체를 들고 수평으로 걷기).'},
  {id:'MOT-13',t:'운동과 에너지',code:'MOT',term:'에너지',
   def:'일을 할 수 있는 능력. 단위는 J(줄). 일과 에너지는 서로 전환된다.'},
  {id:'MOT-14',t:'운동과 에너지',code:'MOT',term:'중력에 의한 위치 에너지',
   def:'높은 곳에 있는 물체가 중력을 받아 일할 수 있는 능력. 무게와 높이에 각각 비례.',
   formula:'위치 에너지(J) = <b>9.8 × 질량 × 높이</b> &nbsp;(E = 9.8mh)',
   extra:'기준면을 어디로 잡느냐에 따라 값이 달라진다.'},
  {id:'MOT-15',t:'운동과 에너지',code:'MOT',term:'운동 에너지',
   def:'운동하는 물체가 가진 에너지. 질량과 속력<sup>2</sup>에 비례.',
   formula:'운동 에너지(J) = <b>½ × 질량 × 속력<sup>2</sup></b> &nbsp;(E = ½mv<sup>2</sup>)'},

  // ===== 역학적 에너지 전환과 보존 (VI-1) =====
  {id:'MEC-01',t:'역학적 에너지',code:'MEC',term:'역학적 에너지',
   def:'중력에 의한 위치 에너지와 운동 에너지의 합.',
   formula:'역학적 에너지 = <b>위치 에너지 + 운동 에너지</b>'},
  {id:'MEC-02',t:'역학적 에너지',code:'MEC',term:'역학적 에너지 전환',
   def:'중력을 받아 운동하는 물체에서 위치 에너지와 운동 에너지가 서로 전환되어 크기가 달라지는 것.'},
  {id:'MEC-03',t:'역학적 에너지',code:'MEC',term:'떨어지는 물체',
   def:'높이가 낮아지면서 <b>위치 에너지 → 운동 에너지</b>로 전환. 위치 E 감소, 운동 E 증가.'},
  {id:'MEC-04',t:'역학적 에너지',code:'MEC',term:'역학적 에너지 보존 법칙',
   def:'공기 마찰이 없을 때, <b>감소한 위치 에너지 = 증가한 운동 에너지</b>. 둘의 합인 역학적 에너지는 높이에 관계없이 일정하게 보존된다.',
   formula:'위치 E + 운동 E = 일정 (보존)'},
  {id:'MEC-05',t:'역학적 에너지',code:'MEC',term:'던져 올린 물체',
   def:'올라갈 때 <b>운동 에너지 → 위치 에너지</b>로 전환. 운동 E 감소, 위치 E 증가.',
   extra:'가장 높은 지점에서 속력 0 → 운동 E = 0, 위치 E 최대.'},
  {id:'MEC-06',t:'역학적 에너지',code:'MEC',term:'같은 높이에서의 속력',
   def:'연직으로 던져 올린 물체는 (마찰이 없으면) 올라갈 때와 내려올 때 <b>같은 지점을 같은 속력</b>으로 지난다.'},
  {id:'MEC-07',t:'역학적 에너지',code:'MEC',term:'역학적 에너지 전환의 예',
   def:'롤러코스터(내려갈 때 위치 E→운동 E, 올라갈 때 운동 E→위치 E), 스케이트보드, 그네 등.',
   extra:'레일·공기와의 마찰이 없으면 역학적 에너지는 일정하게 <b>보존</b>된다.'},
];

const TOPIC_COLOR = {'대기 중의 물':C.ATM,'운동과 에너지':C.MOT,'역학적 에너지':C.MEC};
const $ = id => document.getElementById(id);

let topic='all', unknownOnly=false, order=[], idx=0, flipped=false;
let shuffleSeq=null;            // null = natural order; otherwise a permuted list of all indices
const known = new Set();

function baseSeq(){ return shuffleSeq ? shuffleSeq : CARDS.map((c,i)=>i); }
function buildOrder(){
  order = baseSeq()
    .filter(i => topic==='all' || CARDS[i].t===topic)
    .filter(i => !unknownOnly || !known.has(CARDS[i].id));
}
function clamp(){ if(idx>=order.length) idx=0; if(idx<0) idx=order.length-1; }

function render(){
  buildOrder();
  const empty = order.length===0;
  $('empty').style.display = empty?'block':'none';
  $('card').style.display = empty?'none':'block';
  $('nav').style.display = empty?'none':'flex';
  $('counter').style.visibility = empty?'hidden':'visible';
  if(empty){ $('fill').style.width='100%'; updKnown(); return; }

  clamp();
  const c = CARDS[order[idx]];
  const col = TOPIC_COLOR[c.t];

  flipped=false; $('card').classList.remove('flip');

  $('term').innerHTML = c.term;
  $('def').innerHTML = c.def;
  const f=$('formula'); if(c.formula){f.style.display='block';f.innerHTML=c.formula;f.style.color=col;} else f.style.display='none';
  const ex=$('extra'); if(c.extra){ex.style.display='block';ex.innerHTML=c.extra;} else ex.style.display='none';

  ['pid-f','pid-b'].forEach(k=>$(k).textContent=c.id);
  ['tag-f','tag-b'].forEach(k=>{$(k).textContent=c.t;});
  ['rail-f','rail-b'].forEach(k=>$(k).style.background=col);
  $('pid-f').style.color=col; $('pid-b').style.color=col;

  $('counter').textContent = (idx+1)+' / '+order.length;
  $('fill').style.width = ((idx+1)/order.length*100)+'%';
  const kb=$('know'); kb.setAttribute('aria-pressed', known.has(c.id)?'true':'false');
  kb.textContent = known.has(c.id)?'외움 ✓':'안다';
  updKnown();
}
function updKnown(){ $('known-count').textContent = '외움 '+known.size; }

function flip(){ flipped=!flipped; $('card').classList.toggle('flip',flipped); }
function next(){ idx++; render(); }
function prev(){ idx--; render(); }
function toggleKnown(){
  if(order.length===0) return;
  const id = CARDS[order[idx]].id;
  if(known.has(id)) known.delete(id); else known.add(id);
  if(unknownOnly && known.has(id)){ render(); } else { render(); }
}

// controls
$('flip').onclick = flip;
$('card').onclick = flip;
$('card').onkeydown = e=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();} };
$('next').onclick = e=>{e.stopPropagation();next();};
$('prev').onclick = e=>{e.stopPropagation();prev();};
$('know').onclick = e=>{e.stopPropagation();toggleKnown();};

$('chips').addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  topic=b.dataset.topic; idx=0;
  [...$('chips').children].forEach(x=>x.setAttribute('aria-pressed', x===b?'true':'false'));
  render();
});
$('unknown-toggle').onclick = function(){
  unknownOnly=!unknownOnly; this.setAttribute('aria-pressed',unknownOnly?'true':'false'); idx=0; render();
};
$('shuffle').onclick = ()=>{
  const seq = CARDS.map((c,i)=>i);
  for(let i=seq.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[seq[i],seq[j]]=[seq[j],seq[i]];}
  shuffleSeq = seq; idx=0; render();
};
$('reset').onclick = ()=>{
  known.clear(); shuffleSeq=null; unknownOnly=false;
  $('unknown-toggle').setAttribute('aria-pressed','false');
  idx=0; render();
};

// keyboard
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'){next();}
  else if(e.key==='ArrowLeft'){prev();}
  else if(e.key==='ArrowUp'){e.preventDefault();flip();}
  else if(e.key.toLowerCase()==='k'){toggleKnown();}
});

// touch swipe
let tx=0,ty=0,moved=false;
const card=$('card');
card.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;moved=false;},{passive:true});
card.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-tx)>10)moved=true;},{passive:true});
card.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); }
});

$('total-tag').textContent = CARDS.length+' CARDS';
render();
</script>
</body>
</html>
