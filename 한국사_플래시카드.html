<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국사 플래시카드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 {
    font-size: 1.3rem;
    color: #3a2e2e;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  /* 덱 선택 */
  .deck-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .deck-tab {
    padding: 8px 18px;
    border-radius: 20px;
    border: 2px solid #c9b99a;
    background: white;
    color: #5a4a3a;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .deck-tab:hover { background: #ede0cc; }
  .deck-tab.active {
    background: #8b5e3c;
    border-color: #8b5e3c;
    color: white;
  }

  /* 진행상황 */
  .progress-bar-wrap {
    width: 100%;
    max-width: 480px;
    background: #ddd;
    border-radius: 10px;
    height: 6px;
    margin-bottom: 10px;
  }
  .progress-bar {
    height: 6px;
    background: #8b5e3c;
    border-radius: 10px;
    transition: width 0.3s;
  }
  .progress-text {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 20px;
    text-align: center;
  }

  /* 카드 */
  .card-scene {
    width: 100%;
    max-width: 480px;
    height: 300px;
    perspective: 1000px;
    margin-bottom: 28px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .card-front {
    background: white;
  }
  .card-back {
    background: #fdf6ee;
    transform: rotateY(180deg);
  }
  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 14px;
  }
  .card-front .card-label { color: #8b5e3c; }
  .card-text {
    font-size: 1.15rem;
    color: #2c2c2c;
    line-height: 1.7;
  }
  .card-back .card-text {
    font-size: 1rem;
    color: #3a2e2e;
  }
  .tap-hint {
    font-size: 0.72rem;
    color: #bbb;
    margin-top: 16px;
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn {
    padding: 11px 28px;
    border-radius: 24px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-prev { background: #e8ddd0; color: #5a4a3a; }
  .btn-next { background: #8b5e3c; color: white; }
  .btn-shuffle { background: #e8ddd0; color: #5a4a3a; font-size: 0.85rem; padding: 9px 18px; }
  .btn-prev:hover { background: #d9ccc0; }
  .btn-next:hover { background: #7a5033; }
  .btn-shuffle:hover { background: #d9ccc0; }

  .done-msg {
    display: none;
    font-size: 1rem;
    color: #8b5e3c;
    font-weight: 600;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<h1>📚 한국사 플래시카드</h1>

<div class="deck-tabs" id="deckTabs"></div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText"></div>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="card-label">앞면</div>
      <div class="card-text" id="cardFront"></div>
      <div class="tap-hint">탭해서 뒤집기</div>
    </div>
    <div class="card-face card-back">
      <div class="card-label">뒷면</div>
      <div class="card-text" id="cardBack"></div>
    </div>
  </div>
</div>

<div class="done-msg" id="doneMsg">🎉 이 덱 완료!</div>

<div class="btn-row">
  <button class="btn btn-prev" onclick="prevCard()">◀ 이전</button>
  <button class="btn btn-next" onclick="nextCard()">다음 ▶</button>
</div>
<button class="btn btn-shuffle" onclick="shuffleDeck()">🔀 셔플</button>

<script>
const DECKS = {"발해": [{"front": "발해", "back": "고구려가 멸망한 뒤,<br><br>고구려 사람들과 말갈 사람들이 힘을 모아 세운 나라야.<br><br>📌 한 줄 암기<br><br>발해 = 고구려 계승 국가"}, {"front": "대조영", "back": "발해 세운 사람<br><br>대조영이 698년에 발해를 세웠어.<br><br>대조영은 고구려 유민을 이끌고 새로운 나라를 만들었어.<br><br>📌 한 줄 암기<br><br>대조영 = 발해 건국"}, {"front": "발해를 고구려 ㄱㅖ승나라라고 하는 이유", "back": "✔ 대조영이 고구려 사람이고,<br><br>✔ 고구려 문화를 이어받았으며,<br><br>✔ 스스로도 고구려를 계승한 나라라고 생각했기 때문이야.<br><br>📌 한 줄 암기<br><br>발해 = 고구려를 이은 나라"}, {"front": "무왕", "back": "무왕은 적극적으로 영토를 넓히고,<br><br>당나라와도 맞서 싸우며 발해의 힘을 키웠어.<br><br>📌 한 줄 암기<br><br>무왕 = 영토 확장"}, {"front": "문왕", "back": "문왕은 나라의 제도를 정비하고,<br><br>수도를 상경으로 옮겼어.<br><br>또 당나라와 친하게 지내며 나라를 안정시켰어.<br><br>📌 한 줄 암기<br><br>문왕 = 상경 천도 + 제도 정비"}, {"front": "선왕", "back": "선왕 때 발해의 영토가 가장 넓어졌어.<br><br>나라가 가장 강하고 발전하여<br><br>중국에서는 발해를 해동성국이라고 불렀어.<br><br>📌 한 줄 암기<br><br>선왕 = 해동성국"}, {"front": "해동성국", "back": "해동'은 동쪽 나라,<br><br>'성국'은 번성한 나라라는 뜻이야.<br><br>즉,<br><br>**\"동쪽의 강하고 잘사는 나라\"**라는 뜻이야.<br><br>📌 한 줄 암기<br><br>해동성국 = 발전한 발해"}, {"front": "발해는 어떤 나라의 정치제도를 발아들였나?", "back": "발해는 당나라의 정치 제도를 받아들여 나라를 운영했어.<br><br>하지만 발해에 맞게 조금 바꾸어 사용했어.<br><br>📌 한 줄 암기<br><br>발해 = 당나라 제도 수용"}, {"front": "발해의 중앙정치 조직은", "back": "3성 6부 제도를 운영했어.<br><br>나라의 중요한 일을 나누어 맡아 처리했어.<br><br>📌 한 줄 암기<br><br>발해 = 3성 6부"}, {"front": "발해와 적대관계(사이 안좋음)<br>", "back": "신라 (고구려 멸망시킴)   당(나중에 친선관계 됨)"}, {"front": "발해 정치 제도", "back": "3성6부"}, {"front": "발해의 3성중 정당성", "back": "발해의 3성은<br><br>✔ 정당성<br>발해 최고의 의결기구 회의하는 곳<br>충 의 예 지 신 인<br>"}, {"front": "발해  행정제도", "back": "5경 15부 62주"}, {"front": "5경", "back": "나라가 넓었기 때문에<br><br>여러 중요한 도시를 중심으로 효율적으로 다스리기 위해 만들었어.<br><br>수도는 상경이야.<br><br>📌 한 줄 암기<br><br>5경 = 지방을 효율적으로 관리"}, {"front": "15부", "back": "말단 행정기구 촌락 <br>민족 융합 위해 <br>말갈족에서 촌주"}, {"front": "발해 문화 특징", "back": "✔ 고구려 문화를 이어받았고,<br><br>✔ 당나라 문화도 받아들였어.<br><br>그래서 두 문화가 함께 나타나는 것이 특징이야.<br><br>📌 한 줄 암기<br><br>발해 문화 = 고구려 + 당"}, {"front": "발해 생활 특징", "back": "겨울이 추웠기 때문에<br><br>온돌을 사용했어.<br><br>또 농사와 무역도 활발했어.<br><br>📌 한 줄 암기<br><br>발해 = 온돌 사용"}, {"front": " let currentDeck = Object.keys(DECKS)[0];
let cards = [];
let idx = 0;
let flipped = false;

function initTabs() {
  const tabs = document.getElementById('deckTabs');
  tabs.innerHTML = '';
  Object.keys(DECKS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'deck-tab' + (name === currentDeck ? ' active' : '');
    btn.textContent = name + ' (' + DECKS[name].length + '장)';
    btn.onclick = () => selectDeck(name);
    tabs.appendChild(btn);
  });
}

function selectDeck(name) {
  currentDeck = name;
  cards = [...DECKS[name]];
  idx = 0;
  flipped = false;
  document.querySelectorAll('.deck-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  showCard();
}

function showCard() {
  const done = document.getElementById('doneMsg');
  const scene = document.getElementById('cardScene');

  if (idx >= cards.length) {
    done.style.display = 'block';
    scene.style.opacity = '0.4';
    return;
  }
  done.style.display = 'none';
  scene.style.opacity = '1';

  const card = cards[idx];
  document.getElementById('cardFront').innerHTML = card.front;
  document.getElementById('cardBack').innerHTML = card.back;

  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  flipped = false;

  const pct = Math.round((idx / cards.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = idx + 1 + ' / ' + cards.length;
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  flipped = !flipped;
  inner.classList.toggle('flipped', flipped);
}

function nextCard() {
  if (idx < cards.length) idx++;
  showCard();
}

function prevCard() {
  if (idx > 0) idx--;
  showCard();
}

function shuffleDeck() {
  cards = [...DECKS[currentDeck]].sort(() => Math.random() - 0.5);
  idx = 0;
  showCard();
}

// 키보드 지원
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// 초기화
cards = [...DECKS[currentDeck]];
initTabs();
showCard();
</script>
</body>
</html>
